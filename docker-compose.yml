services:
  sftp:
    image: atmoz/sftp
    ports:
      - "2222:22"
    volumes:
      - ./data:/home/testuser/upload
    command: testuser:password:1001

  ssh:
    image: linuxserver/openssh-server
    ports:
      - "2223:2222"
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD_ACCESS=true
      - USER_NAME=testuser
      - USER_PASSWORD=password

